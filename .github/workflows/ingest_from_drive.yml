name: Ingest from Drive

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Folder to ingest (qia / nz / mfds_price / mfds_records / kstat / all)"
        required: false
        default: "all"

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # needed to trigger build_site.yml below
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VKH_SHEET_ID: ${{ secrets.VKH_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PYTHONPATH=. python scripts/ingest_from_drive.py --folder ${{ github.event.inputs.folder }}

      - name: Trigger site rebuild + deploy
        # D1 addendum 2026-07-10: since 3f8e658, Pages deploys from
        # build_site.yml's actions/deploy-pages artifact, not from a docs/
        # commit — this workflow's old "rebuild locally, git commit docs/,
        # push [skip ci]" finale could never actually reach the live site
        # (and [skip ci] suppressed a re-trigger that wasn't happening
        # anyway). One Pages-deploy code path, not two to keep in sync:
        # dispatch the real build/deploy workflow instead of duplicating
        # its steps here.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build_site.yml --ref ${{ github.ref_name }}
