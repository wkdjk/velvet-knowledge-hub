name: Build and deploy site

on:
  schedule:
    - cron: '0 2 * * 1'   # Monday 02:00 UTC (11:00 KST)
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write           # needed to commit docs/ back to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt
        env:
          PYTHONPATH: "."    # L-1: PYTHONPATH on every step

      - name: Validate config
        env:
          PYTHONPATH: "."    # L-1: PYTHONPATH on every step
        run: python scripts/validate_config.py

      - name: Collect Naver news
        env:
          PYTHONPATH: "."
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VKH_SHEET_ID: ${{ secrets.VKH_SHEET_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/collect_naver.py

      - name: Classify articles
        env:
          PYTHONPATH: "."
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VKH_SHEET_ID: ${{ secrets.VKH_SHEET_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/classify_articles.py

      - name: Build site
        env:
          PYTHONPATH: "."    # L-1: PYTHONPATH on every step
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VKH_SHEET_ID: ${{ secrets.VKH_SHEET_ID }}
        run: python scripts/build.py

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore(build): update docs/ [skip ci]"
          git push

      - name: Send error alert email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.ALERT_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: Velvet Knowledge Hub <${{ secrets.ALERT_EMAIL }}>
          subject: "[VKH Alert] Weekly update failed — build #${{ github.run_number }}"
          body: |
            The automatic weekly update for the Velvet Knowledge Hub did not complete successfully (build #${{ github.run_number }}). The live site is unchanged and remains accessible to readers — it is showing data from the previous successful update.

            To find out what went wrong:

            1. Open this link: ${{ github.run_url }}
            2. Look for any step marked with a red cross.
            3. Click that step to expand the log and read the error message.
            4. If the error mentions a data source (for example, Google Sheets or Naver), check that the source is accessible and try re-running the update from the same page.
            5. If you are unsure what to do, forward this email to your technical contact.

            All sections on the site may be showing data from a previous update. It is not possible to identify which specific section was affected without checking the log. The site remains live and readable.

            The site remains available to readers with data from the previous successful build.
